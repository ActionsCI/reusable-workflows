name: Run pre-commit checks (reusable workflow)

on:
  workflow_call:
    inputs:
      additional-cache-configs:
        type: string
        description: |
          Additional paths to cache in a following format, globs are not supported:
            [
              {
                "path": "path/to/stuff_to_cache",
                "key": "path/to/file_which_defines_the_above"
              },
              {
                "path": "~/.tflint.d",
                "key": "./.tflint.hcl"
              },
              ...
            ]
        required: false
        default: '[]'
    secrets:
      BOLTCI_GITHUB_TOKEN:
        required: true

jobs:
  pre-commit-check:
    runs-on: ubuntu-latest
    env:
      PRE_COMMIT_NO_CONCURRENCY: 1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install 'pre-commit~=4.0'
      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ env.pythonLocation }}|${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Prepare cache action inputs for additional paths
        id: prepare-cache-action-inputs-for-additional-paths
        uses: actions/github-script@v7
        with:
          script: |
            const crypto = require('crypto')
            const fs = require('fs')

            function generateHashFromFile(filePath) {
              const fileBuffer = fs.readFileSync(filePath)
              const hashSum = crypto.createHash('sha256')
              hashSum.update(fileBuffer)
              const hex = hashSum.digest('hex')
              return `${hex}`
            }

            const additionalCacheConfigs = JSON.parse(${{ toJSON(inputs.additional-cache-configs) }});

            if (additionalCacheConfigs.length == 0) {
              return {enabled: false, path: '', key: ''}
            }

            const path = additionalCacheConfigs.reduce((acc, {path}) => {
              acc += `${path}\n`
              return acc
            }, '')
            const intermediateKey = additionalCacheConfigs.reduce((acc, {key}) => {
              acc += `${generateHashFromFile(key)}|`
              return acc
            }, '')
            const key = crypto.createHash('sha256').update(intermediateKey).digest('hex')

            return {
              enabled: true,
              path,
              key
            }

      - name: Cache additional paths
        if: ${{ fromJSON(steps.prepare-cache-action-inputs-for-additional-paths.outputs.result).enabled }}
        uses: actions/cache@v4
        with:
          path: ${{ fromJSON(steps.prepare-cache-action-inputs-for-additional-paths.outputs.result).path }}
          key: ${{ fromJSON(steps.prepare-cache-action-inputs-for-additional-paths.outputs.result).key }}
      - run: git config --global 'url.https://bolt-ci:${{ secrets.BOLTCI_GITHUB_TOKEN }}@github.com/.insteadOf' 'ssh://git@github.com'
      - uses: jdx/mise-action@v2
      - name: Run pre-commit checks
        run: |
          . <(mise activate bash)
          case "${{ github.event_name }}" in
            pull_request)
              pre-commit run \
                --from-ref "${{ github.event.pull_request.base.sha }}" \
                --to-ref   "${{ github.event.pull_request.head.sha }}"
              ;;
            push)
              pre-commit run \
                --from-ref "${{ github.event.before }}" \
                --to-ref   "${{ github.event.after }}"
              ;;
          esac
