name: Docker Build and Push (Reusable)
on:
  workflow_call:
    inputs:
      service_name:
        description: 'Service name from matrix (e.g. my-service)'
        required: true
        type: string
      image_tag:
        description: 'Docker image tag (e.g. v1.2.3)'
        required: true
        type: string
      ecr_url:
        description: 'ECR registry URL'
        required: true
        type: string
      ecr_region:
        description: 'AWS region for ECR'
        required: true
        type: string
      role_arn:
        description: 'AWS IAM role to assume via OIDC'
        required: true
        type: string
      repository_name:
        description: 'Image repository name (defaults to service_name if omitted)'
        required: false
        type: string
        default: ''
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: 'Dockerfile'
      context:
        description: 'Docker build context'
        required: false
        type: string
        default: '.'
      push:
        description: 'Whether to push the image to ECR'
        required: false
        type: boolean
        default: true
      build_args:
        description: 'Newline-delimited list of build-args in KEY=VALUE form'
        required: false
        type: string
        default: ''
    secrets:
      GH_TOKEN:
        required: false

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials from OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_arn }}
          aws-region: ${{ inputs.ecr_region }}

      - name: Build Docker image
        uses: docker/build-push-action@v6.18.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: false
          load: true
          build-args: ${{ inputs.build_args }}
          tags: ${{ inputs.ecr_url }}/${{ inputs.repository_name != '' && inputs.repository_name || inputs.service_name }}:${{ inputs.image_tag }}

      - name: Login to ECR
        if: ${{ inputs.push == true }}
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_URL }}
        env:
          AWS_REGION: ${{ inputs.ecr_region }}
          ECR_URL: ${{ inputs.ecr_url }}

      - name: Push Docker image
        if: ${{ inputs.push == true }}
        uses: docker/build-push-action@v6.18.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          build-args: ${{ inputs.build_args }}
          tags: ${{ inputs.ecr_url }}/${{ inputs.repository_name != '' && inputs.repository_name || inputs.service_name }}:${{ inputs.image_tag }}
        env:
          DOCKER_BUILD_SUMMARY: 'false'

      - name: Docker Build Summary
        run: |
          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** \`${{ inputs.service_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ inputs.ecr_url }}/${{ inputs.repository_name != '' && inputs.repository_name || inputs.service_name }}:${{ inputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Pushed:** \`${{ inputs.push }}\`" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ inputs.build_args }}" ]; then
            echo "**Build args:**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            printf "%s\n" "${{ inputs.build_args }}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi