name: build app and docker
on:
  workflow_call:
    inputs:
      version:
        description: 'Version of the app'
        required: true
        type: string
      registry_url:
        description: 'Registry URL'
        required: false
        type: string
        default: 'gcr.io/face-swipe-app'
      docker_image:
        description: 'Docker image name'
        required: false
        type: string
        default: 'face-swipe-app'
    secrets:
      credentials_json:
        description: 'GCP service-account credentials JSON'
        required: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
    - name: setup GCP SA for docker login
      uses: google-github-actions/auth@3a3c4c57d294ef65efaaee4ff17b22fa88dd3c69 # v1.3.0
      with:
        credentials_json: "${{ secrets.credentials_json }}"
        project_id: face-swipe-app
    - name: GCP Docker Login
      id: get-docker-token
      run: gcloud auth configure-docker

    - name: Build and Push Docker Image
      uses: ActionsCI/docker-build-push@main
      with:
        version: "${{ inputs.version }}"
        image_name: "${{ inputs.docker_image }}"
        registry_url: "${{ inputs.registry_url }}"
        # registry_token: ${{ steps.get-docker-token.outputs.DOCKER_TOKEN }}