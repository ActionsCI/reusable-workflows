name: __ Service Deployment (reusable workflow)

# Trivial touch to re-exercise build-eks-pr-test post-merge. Safe to revert.
on:
  workflow_call:
    inputs:
      service:
        description: Name of a service to be deployed
        required: true
        type: string
      helmTag:
        description: Helm tag to be deployed
        required: true
        type: string
      env:
        description: Environment to deploy the service to
        required: true
        type: string
      target_branch:
        description: Branch in ActionsCI/gitops to commit to (default main)
        required: false
        type: string
        default: 'main'
    secrets:
      GH_TOKEN:
        description: Pre-minted token with write access to ActionsCI/gitops. If omitted, CI_APP_ID + CI_APP_PRIVATE_KEY must be provided and a short-lived App token will be minted in-job.
        required: false
      CI_APP_ID:
        description: GitHub App ID. Used only when GH_TOKEN is not provided.
        required: false
      CI_APP_PRIVATE_KEY:
        description: Base64-encoded GitHub App private key. Used only when GH_TOKEN is not provided.
        required: false

jobs:
  service-deployment:
    environment: ${{ inputs.env }}
    concurrency: deployment-${{ inputs.service }}-${{ inputs.env }}
    runs-on: ubuntu-24.04
    env:
      FORCE_COLOR: 1
    steps:
      - name: Select auth mode
        id: auth-mode
        env:
          PROVIDED_TOKEN: ${{ secrets.GH_TOKEN }}
          APP_ID: ${{ secrets.CI_APP_ID }}
          APP_KEY_B64: ${{ secrets.CI_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -n "$PROVIDED_TOKEN" ]; then
            echo "mode=provided" >> "$GITHUB_OUTPUT"
          elif [ -n "$APP_ID" ] && [ -n "$APP_KEY_B64" ]; then
            echo "mode=app" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Neither GH_TOKEN nor CI_APP_ID+CI_APP_PRIVATE_KEY was supplied to service-deployment-gitops.yaml."
            exit 1
          fi

      - name: Decode App private key (base64)
        if: steps.auth-mode.outputs.mode == 'app'
        env:
          APP_KEY_B64: ${{ secrets.CI_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          decoded=$(printf '%s' "$APP_KEY_B64" | base64 -d)
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done <<< "$decoded"
          {
            echo "APP_PRIVATE_KEY<<EOF_APP_KEY"
            printf '%s\n' "$decoded"
            echo "EOF_APP_KEY"
          } >> "$GITHUB_ENV"

      - name: Mint App installation token
        id: app-token
        if: steps.auth-mode.outputs.mode == 'app'
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ env.APP_PRIVATE_KEY }}
          owner: ActionsCI
          repositories: gitops

      - name: Checkout gitops repo
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GH_TOKEN }}
          repository: ActionsCI/gitops
          fetch-depth: 0
      - name: Update the tag (idempotent, with summary)
        run: |
          npx zx <<'EOF'
          try {
            $.verbose = true
            $.sync = true

            const fs = await import('node:fs')

            const envName = "${{ inputs.env }}"
            const serviceName = "${{ inputs.service }}"
            const requestedVersion = "${{ inputs.helmTag }}"
            const targetBranch = "${{ inputs.target_branch }}" || 'main'
            const valuesYaml = `service/${serviceName}/${envName}/values.yaml`

            if (targetBranch !== 'main') {
              $`git checkout -B ${targetBranch} origin/main`
            }

            const summary = process.env.GITHUB_STEP_SUMMARY
            const writeSummary = (statusLine, extras = []) => {
              if (!summary) return
              const lines = [
                '## GitOps Deployment Summary',
                `**Service:** \`${serviceName}\``,
                `**Environment:** \`${envName}\``,
                `**Target branch:** \`${targetBranch}\``,
                `**GitOps Path:** \`${valuesYaml}\``,
                statusLine,
                ...extras,
                ''
              ]
              fs.appendFileSync(summary, lines.join('\n'))
            }

            const readTag = async () => {
              try {
                return (await $`yq -r '.image.tag // ""' ${valuesYaml}`).stdout.trim()
              } catch { return '' }
            }

            const tagFieldExists = async () => {
              try {
                const out = (await $`yq -r 'has("image") and (.image | has("tag"))' ${valuesYaml}`).stdout.trim()
                return out === 'true'
              } catch { return false }
            }

            if (!fs.existsSync(valuesYaml)) {
              console.warn(chalk.yellow(`GitOps path not found: ${valuesYaml}.`))
              writeSummary('**Status:** ⚠️ Skipped (GitOps path missing)')
              process.exit(0)
            }

            if (!(await tagFieldExists())) {
              console.warn(chalk.yellow(`No .image.tag field in ${valuesYaml}.`))
              writeSummary("**Status:** ⚠️ Skipped (no '.image.tag' in values.yaml)")
              process.exit(0)
            }

            const currentVersion = await readTag()
            if (currentVersion === requestedVersion) {
              writeSummary('**Status:** ✅ Version confirmed (no commit needed)', [
                `**Old tag:** \`${currentVersion}\``,
                `**New tag:** \`${requestedVersion}\``
              ])
              process.exit(0)
            }

            // Write requested version (in-place)
            $`yq '.image.tag = "${requestedVersion}"' -i "${valuesYaml}"`

            // Verify the file now contains the requested version
            const newVersion = await readTag()
            if (newVersion !== requestedVersion) {
              writeSummary('**Status:** ⚠️ Requested tag not applied', [
                `**Old tag:** \`${currentVersion}\``,
                `**Requested:** \`${requestedVersion}\``,
                `**Observed:** \`${newVersion}\``
              ])
              process.exit(1)
            }

            // OG pattern: ensure there ARE changes to commit; if not, treat as confirmed
            try {
              // Negated exit-code: throws when no changes
              $`! git diff --exit-code`
            } catch {
              writeSummary('**Status:** ✅ Version confirmed (no commit needed)', [
                `**Old tag:** \`${currentVersion}\``,
                `**New tag:** \`${newVersion}\``
              ])
              process.exit(0)
            }

            // Commit and push changes
            $`git config --global user.name "ActionsCI"`
            $`git config --global user.email "ActionsCI@burnin-media.com"`
            $`git add ${valuesYaml}`
            $`git commit -m"CD - Deploy ${serviceName}:${requestedVersion} to ${envName}"`

            if (targetBranch === 'main') {
              await retry(5, () => {
                try { $`git push` } catch { $`git pull --rebase`; throw new Error('Push failed.') }
              })
            } else {
              await retry(5, () => {
                try { $`git push --force origin HEAD:${targetBranch}` } catch { throw new Error('Push failed.') }
              })
            }

            writeSummary('**Status:** ✅ Deployed successfully', [
              `**Old tag:** \`${currentVersion}\``,
              `**New tag:** \`${newVersion}\``
            ])
          } catch (error) {
            console.error(chalk.red.bold(`${error}`));
            process.exit(1)
          }
          EOF

    # No separate summary step to avoid duplication
