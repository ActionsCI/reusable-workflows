name: Build EKS PR Test

# Direct PR smoke for service-deployment-gitops.yaml.
#
# Why we are not dispatching the boilerplate anymore: the full build-eks.yaml
# chain depends on ECR-flavored docker-build-push and helm-package-push
# reusable workflows that do not exist in this repo yet. Until those land,
# the only part of the pipeline that's both real and touches external state
# is service-deployment-gitops.yaml. This workflow exercises it directly
# against a throwaway pr-test/<pr-number> branch in ActionsCI/gitops, which
# is the actual behavior we want to guard in a PR.
#
# Prerequisite fixture (one-time setup in ActionsCI/gitops on main):
#   service/pr-smoke/sandbox/Chart.yaml must exist and declare a
#   `dependencies[]` entry with `alias: service`. Without it,
#   service-deployment-gitops.yaml skips with "Status: Skipped (GitOps path
#   missing)" and this workflow reports a false-positive green. The
#   verify-commit job below defends against that by asserting the pr-test
#   branch is actually ahead of main after the smoke runs.

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - '.github/workflows/service-deployment-gitops.yaml'
      - '.github/workflows/build-eks-pr-test.yaml'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to re-run smoke for'
        required: true
        type: string

concurrency:
  group: build-eks-pr-test-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  GITOPS_REPO: ActionsCI/gitops
  SMOKE_SERVICE: pr-smoke
  SMOKE_ENV: sandbox

jobs:
  mint-token:
    if: github.event.action != 'closed'
    name: Mint GitHub App installation token
    runs-on: ubuntu-24.04
    outputs:
      token: ${{ steps.app-token.outputs.token }}
    steps:
      - name: Decode GitHub App private key (base64)
        env:
          APP_KEY_B64: ${{ secrets.CI_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          decoded=$(printf '%s' "$APP_KEY_B64" | base64 -d)
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done <<< "$decoded"
          {
            echo "APP_PRIVATE_KEY<<EOF_APP_KEY"
            printf '%s\n' "$decoded"
            echo "EOF_APP_KEY"
          } >> "$GITHUB_ENV"

      - name: Mint token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ env.APP_PRIVATE_KEY }}
          owner: ActionsCI
          repositories: gitops

  gitops-smoke:
    if: github.event.action != 'closed'
    name: Exercise service-deployment-gitops against pr-test/<n>
    needs: mint-token
    uses: ./.github/workflows/service-deployment-gitops.yaml
    with:
      service: pr-smoke
      env: sandbox
      helmTag: 0.0.0-pr${{ github.event.pull_request.number || inputs.pr_number }}-${{ github.event.pull_request.head.sha || github.sha }}
      target_branch: pr-test/${{ github.event.pull_request.number || inputs.pr_number }}
    secrets:
      GH_TOKEN: ${{ needs.mint-token.outputs.token }}

  verify-commit:
    if: github.event.action != 'closed'
    name: Verify pr-test branch actually got a new commit
    needs: [mint-token, gitops-smoke]
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ needs.mint-token.outputs.token }}
      PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
    steps:
      - name: Confirm pr-test/${{ github.event.pull_request.number || inputs.pr_number }} is ahead of main
        run: |
          set -euo pipefail
          branch="pr-test/${PR_NUMBER}"
          main_sha=$(gh api "repos/${GITOPS_REPO}/commits/main" --jq '.sha')
          branch_sha=$(gh api "repos/${GITOPS_REPO}/git/refs/heads/${branch}" --jq '.object.sha' 2>/dev/null || echo "")
          if [ -z "${branch_sha}" ]; then
            echo "::error::Branch ${branch} does not exist on ${GITOPS_REPO} - service-deployment-gitops did not push"
            exit 1
          fi
          if [ "${branch_sha}" = "${main_sha}" ]; then
            echo "::error::Branch ${branch} is at the same SHA as main (${main_sha::7}). The smoke likely hit the skip path - check that service/${SMOKE_SERVICE}/${SMOKE_ENV}/Chart.yaml exists on gitops main with a 'service' alias dependency."
            exit 1
          fi
          {
            echo "## build-eks PR smoke (via service-deployment-gitops)"
            echo ""
            echo "- Service: \`${SMOKE_SERVICE}\`"
            echo "- Env: \`${SMOKE_ENV}\`"
            echo "- Target branch: https://github.com/${GITOPS_REPO}/tree/${branch}"
            echo "- New commit: \`${branch_sha::12}\` (ahead of main \`${main_sha::12}\`)"
          } >> "$GITHUB_STEP_SUMMARY"

  cleanup:
    if: github.event.action == 'closed'
    name: Delete throwaway GitOps branch
    runs-on: ubuntu-24.04
    steps:
      - name: Decode GitHub App private key (base64)
        env:
          APP_KEY_B64: ${{ secrets.CI_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          decoded=$(printf '%s' "$APP_KEY_B64" | base64 -d)
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done <<< "$decoded"
          {
            echo "APP_PRIVATE_KEY<<EOF_APP_KEY"
            printf '%s\n' "$decoded"
            echo "EOF_APP_KEY"
          } >> "$GITHUB_ENV"

      - name: Mint token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ env.APP_PRIVATE_KEY }}
          owner: ActionsCI
          repositories: gitops

      - name: Delete pr-test/${{ github.event.pull_request.number }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          ref="heads/pr-test/${PR_NUMBER}"
          if ! gh api "repos/${GITOPS_REPO}/git/refs/${ref}" >/dev/null 2>&1; then
            echo "Ref ${ref} not found in ${GITOPS_REPO}; nothing to clean up"
            exit 0
          fi
          gh api -X DELETE "repos/${GITOPS_REPO}/git/refs/${ref}"
          echo "Deleted ${ref} from ${GITOPS_REPO}"
