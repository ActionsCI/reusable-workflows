name: "Version Incrementor"
on:
  workflow_call:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Fetch all tags
        run: git fetch --tags

      - name: Get the latest tag
        id: get_tag
        run: |
          # Get all tags and sort by semantic version, handling both v-prefixed and non-prefixed tags
          latest_tag=$(git tag | grep -E '^(v?[0-9]+\.[0-9]+\.[0-9]+|v[0-9]+)$' | sed 's/^v//' | sort -V | tail -n1 | sed 's/^/v/')
          if [ -z "$latest_tag" ] || [ "$latest_tag" = "v" ]; then
            latest_tag="v0.1.0"
          fi
          echo "Latest tag: $latest_tag"
          echo "tag=$latest_tag" >> "$GITHUB_OUTPUT"

      - name: Increment the tag
        id: increment_tag
        run: |
          tag=${{ steps.get_tag.outputs.tag }}
          
          # Remove v prefix if present for parsing
          if [[ $tag == v* ]]; then
            version_part=${tag#v}
          else
            version_part=$tag
          fi
          
          # Parse version components
          IFS='.' read -r -a parts <<< "$version_part"
          
          # Ensure we have at least 3 parts (major.minor.patch)
          if [ ${#parts[@]} -lt 3 ]; then
            parts[0]=${parts[0]:-0}
            parts[1]=${parts[1]:-1}
            parts[2]=${parts[2]:-0}
          fi
          
          # Increment patch version
          parts[2]=$((parts[2] + 1))
          new_version="${parts[0]}.${parts[1]}.${parts[2]}"
          new_tag="v$new_version"
          
          echo "New tag: $new_tag"
          echo "tag=$new_tag" >> "$GITHUB_OUTPUT"

      - name: Tag the commit
        run: |
          new_tag=${{ steps.increment_tag.outputs.tag }}
          git tag "$new_tag"

      - name: Push the tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          new_tag=${{ steps.increment_tag.outputs.tag }}
          if git push origin "$new_tag"; then
            echo "Successfully created and pushed tag: $new_tag"
          else
            echo "::error::Failed to push tag: $new_tag. Tag creation blocked or other error."
            exit 1
          fi